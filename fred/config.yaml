name: FrED Engine
version: 0.11.2
slug: fred
description: "FrED: presence inference and lighting core (LPS + Glow)"
url: https://github.com/RicardoSanchezA/fred-addon-repository
arch:
  - amd64
  - aarch64
image: ghcr.io/ricardosancheza/freds-crib
startup: application
boot: auto
init: false
stage: experimental
homeassistant: 2026.7.0
homeassistant_api: true
ingress: true
ingress_port: 8099
# Supervisor reaches the container directly on the internal network, so the
# literal engine port is correct here. Do NOT change this to [PORT:8099]:
# that placeholder resolves against a published host port, which this add-on
# deliberately does not have -- adding a `ports:` mapping to make it resolve
# would expose 8099 on the LAN and dismantle the ingress trust boundary
# documented in DOCS.md.
watchdog: http://[HOST]:8099/live
ingress_entry: ui/
ingress_stream: true
panel_icon: mdi:floor-plan
panel_title: FrED Home
panel_admin: false
discovery:
  - fred
backup: hot
options:
  observer_mode: false
  max_occupants: 2
schema:
  observer_mode: bool
  max_occupants: int(1,16)
